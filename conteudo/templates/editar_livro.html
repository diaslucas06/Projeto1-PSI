{% extends 'base_cadastro.html' %}

{% block title %} Editar Livro {% endblock %}

{% block titulo %}
    <h1>Editar Livro</h1>
{% endblock %}

{% block form %}
    <form action="{{ url_for('editar_livro', indice=indice) }}" method="post">
        
            <label>Título do Livro:</label>
            <input type="text" name="titulo" value="{{ livro.titulo }}" required>
            <label>Gênero:</label>
            <input type="text" name="genero" value="{{ livro.genero }}" required>
            <label>Descrição:</label>
            <textarea name="descricao" required>{{ livro.desc }}</textarea>
            <div>
                <input type="checkbox" name="lido" {% if livro.lido %} checked {% endif %}>
                Marcar como lido
            </div>
            

        <button type="submit">Salvar Alterações</button>
        <a href="{{ url_for('livros_cadastrados') }}">Cancelar</a>
    </form>
{% endblock %}
