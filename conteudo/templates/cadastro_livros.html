{% extends 'base_cadastro.html' %}

{% block title %}
    Cadastro livros
{% endblock %}

{% block titulo %}
    <h1>Cadastre seu livro</h1>
{% endblock %}

{% block form %}
    <form id="formlivros" action="{{url_for('adicionar_livro')}}" method="post">
        <label for="titulo">Título</label>
        <input type="text" name="titulo" placeholder="Insira o título do livro">
        <label for="titulo">Gênero</label>
        <input type="text" name="genero" placeholder="Insira o gênero do livro">
        <label for="titulo">Descrição</label>
        <textarea name="descricao" placeholder="Insira a descrição do livro"></textarea>
        <button id="BotaoLivro">Enviar</button>
        <p id="mensagem"></p>
    </form>
    <form action="{{url_for('botao_pagLivros')}}" method="post">
        <button>Ir para a página de livros</button>
    </form>
{% endblock %}
